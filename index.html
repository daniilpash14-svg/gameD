<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Runner - Двойной прыжок!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            border: 3px solid #444;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0, 100, 255, 0.2);
        }

        canvas {
            display: block;
            background: #1a1a2e;
            border-radius: 8px;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none;
            border-radius: 8px 8px 0 0;
        }

        #ui span {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        #ui .score { color: #ffd700; }
        #ui .coins { color: #ffdd57; }
        #ui .distance { color: #aaa; }
        #ui .speed { color: #66ccff; }
        #ui .high { color: #ff6b6b; }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: none;
            justify-content: center;
            gap: 20px;
            pointer-events: none;
        }

        #controls button {
            pointer-events: auto;
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            user-select: none;
        }

        #controls button:active {
            transform: scale(0.92);
            background: rgba(255,255,255,0.25);
        }

        #controls .jump-btn {
            background: rgba(0, 200, 100, 0.3);
            border-color: rgba(0, 255, 150, 0.4);
            font-size: 24px;
            padding: 15px 50px;
        }

        #controls .jump-btn:active {
            background: rgba(0, 255, 150, 0.4);
        }

        /* Мобильная адаптация */
        @media (max-width: 850px) {
            #gameContainer {
                width: 100vw;
                height: 100vh;
                border: none;
                border-radius: 0;
            }

            canvas {
                width: 100% !important;
                height: 100% !important;
                border-radius: 0;
            }

            #ui span {
                font-size: 14px;
            }

            #controls {
                display: flex !important;
                bottom: 30px;
            }
        }

        @media (pointer: coarse) {
            #controls {
                display: flex !important;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <span class="score">⭐ <span id="scoreDisplay">0</span></span>
            <span class="coins">🪙 <span id="coinsDisplay">0</span></span>
            <span class="distance">📏 <span id="distDisplay">0</span>м</span>
            <span class="speed">🚀 <span id="speedDisplay">60</span></span>
            <span class="high">🏆 <span id="highDisplay">0</span></span>
        </div>
        <div id="controls">
            <button class="jump-btn" id="jumpBtn">⬆ ПРЫЖОК</button>
        </div>
    </div>

    <script>
        // ==================== КОНФИГУРАЦИЯ ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = 800;
        const HEIGHT = 600;

        // Адаптация под размер экрана
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const maxWidth = window.innerWidth - 20;
            const maxHeight = window.innerHeight - 20;
            const ratio = WIDTH / HEIGHT;

            let displayWidth = maxWidth;
            let displayHeight = maxWidth / ratio;

            if (displayHeight > maxHeight) {
                displayHeight = maxHeight;
                displayWidth = maxHeight * ratio;
            }

            canvas.style.width = displayWidth + 'px';
            canvas.style.height = displayHeight + 'px';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ==================== ЦВЕТА ====================
        const COLORS = {
            WHITE: '#ffffff',
            BLACK: '#000000',
            RED: '#ff3232',
            GREEN: '#32ff32',
            BLUE: '#3232ff',
            YELLOW: '#ffff32',
            ORANGE: '#ff9632',
            PURPLE: '#c832ff',
            CYAN: '#32c8ff',
            DARK_BLUE: '#141432',
            DARK_GRAY: '#282828',
            GRAY: '#646464',
            LIGHT_GRAY: '#c8c8c8',
            PINK: '#ff64c8'
        };

        const PLATFORM_COLORS = [
            '#3c3c50', '#463232', '#324632', '#3c3246', '#323c46', '#503c28', '#283c50'
        ];

        // ==================== КЛАССЫ ====================
        class Player {
            constructor() {
                this.width = 30;
                this.height = 50;
                this.x = 100;
                this.y = HEIGHT - 150 - this.height;
                this.yVelocity = 0;
                this.gravity = 0.8;
                this.jumpStrength = -15;
                this.isJumping = false;
                this.isGrounded = true;
                this.score = 0;
                this.coins = 0;
                this.distance = 0;
                this.speed = 6;
                this.animFrame = 0;
                this.running = true;
                this.gameOver = false;
                this.color = '#3232ff';
                this.onPlatform = false;

                // Двойной прыжок
                this.doubleJumpAvailable = true;
                this.hasDoubleJumped = false;
                this.jumpCount = 0;
                this.maxJumps = 2;
            }

            jump() {
                if (this.isGrounded || this.onPlatform) {
                    this.yVelocity = this.jumpStrength;
                    this.isJumping = true;
                    this.isGrounded = false;
                    this.onPlatform = false;
                    this.jumpCount = 1;
                    this.hasDoubleJumped = false;
                    this.doubleJumpAvailable = true;
                    return true;
                } else if (this.jumpCount < this.maxJumps && !this.hasDoubleJumped) {
                    this.yVelocity = this.jumpStrength * 0.85;
                    this.isJumping = true;
                    this.jumpCount += 1;
                    this.hasDoubleJumped = true;
                    this.doubleJumpAvailable = false;
                    return true;
                }
                return false;
            }

            update(platforms) {
                this.animFrame += 0.1;

                this.yVelocity += this.gravity;
                this.y += this.yVelocity;

                this.isGrounded = false;
                this.onPlatform = false;

                const groundY = HEIGHT - 150 - this.height;
                if (this.y >= groundY) {
                    this.y = groundY;
                    this.yVelocity = 0;
                    this.isJumping = false;
                    this.isGrounded = true;
                    this.onPlatform = false;
                    this.jumpCount = 0;
                    this.hasDoubleJumped = false;
                    this.doubleJumpAvailable = true;
                }

                for (const platform of platforms) {
                    if (this.x + this.width > platform.x + 10 &&
                        this.x < platform.x + platform.width - 10 &&
                        this.y + this.height >= platform.y &&
                        this.y + this.height <= platform.y + 20 &&
                        this.yVelocity >= 0) {
                        this.y = platform.y - this.height;
                        this.yVelocity = 0;
                        this.isJumping = false;
                        this.isGrounded = true;
                        this.onPlatform = true;
                        this.jumpCount = 0;
                        this.hasDoubleJumped = false;
                        this.doubleJumpAvailable = true;
                        break;
                    }
                }

                this.distance += this.speed;
                this.score = Math.floor(this.distance / 10);
            }

            draw(ctx) {
                // Тень
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(this.x + this.width / 2, HEIGHT - 140, this.width / 2, 4, 0, 0, Math.PI * 2);
                ctx.fill();

                // Тело
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);

                // Глаза
                const eyeY = this.y + 12;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.x + 8, eyeY, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + 22, eyeY, 5, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(this.x + 10, eyeY + 1, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + 24, eyeY + 1, 3, 0, Math.PI * 2);
                ctx.fill();

                // Ноги
                const legOffset = 8 * Math.sin(this.animFrame * 4);
                ctx.fillStyle = '#1e1e3c';
                ctx.fillRect(this.x + 5, this.y + this.height - 8, 6, 8 + legOffset * 0.5);
                ctx.fillRect(this.x + 19, this.y + this.height - 8, 6, 8 - legOffset * 0.5);

                // Кроссовки
                ctx.fillStyle = '#ff3232';
                ctx.fillRect(this.x + 3, this.y + this.height - 3 + legOffset * 0.5, 10, 4);
                ctx.fillRect(this.x + 17, this.y + this.height - 3 - legOffset * 0.5, 10, 4);

                // Индикатор двойного прыжка
                if (this.isJumping && !this.isGrounded) {
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    if (this.doubleJumpAvailable && this.jumpCount < this.maxJumps) {
                        ctx.fillStyle = '#ffff32';
                        ctx.fillText('🔄', this.x + this.width / 2, this.y - 25);
                    } else if (this.hasDoubleJumped) {
                        ctx.fillStyle = '#ff3232';
                        ctx.fillText('❌', this.x + this.width / 2, this.y - 25);
                    }
                }
            }
        }

        class Platform {
            constructor(x, y, width, colorIndex = 0) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = 20;
                this.color = PLATFORM_COLORS[colorIndex % PLATFORM_COLORS.length];
                this.scored = false;
                this.isGround = false;
            }

            update(speed) {
                this.x -= speed;
                if (this.x + this.width < 0) {
                    this.x = WIDTH + 150 + Math.random() * 200;
                    this.width = 100 + Math.random() * 150;
                    this.y = HEIGHT - 150 - 30 - Math.random() * 90;
                    this.color = PLATFORM_COLORS[Math.floor(Math.random() * PLATFORM_COLORS.length)];
                    this.scored = false;
                }
            }

            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);

                // Светлая полоса
                ctx.fillStyle = '#ffffff';
                ctx.globalAlpha = 0.3;
                ctx.fillRect(this.x + 5, this.y, this.width - 10, 3);
                ctx.globalAlpha = 1;

                // Детали
                for (let i = 0; i < 3; i++) {
                    const dotX = this.x + 20 + i * (this.width - 40) / 2;
                    ctx.fillStyle = '#c8c8c8';
                    ctx.beginPath();
                    ctx.arc(dotX, this.y + this.height / 2, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        class Coin {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 10;
                this.collected = false;
                this.animFrame = Math.random() * 10;
            }

            update(speed) {
                this.x -= speed;
                this.animFrame += 0.1;
            }

            draw(ctx) {
                if (this.collected) return;
                const pulse = 1 + 0.2 * Math.sin(this.animFrame * 2);
                const radius = this.radius * pulse;

                // Свечение
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, radius * 2);
                grad.addColorStop(0, 'rgba(255, 215, 0, 0.2)');
                grad.addColorStop(1, 'rgba(255, 215, 0, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(this.x, this.y, radius * 2, 0, Math.PI * 2);
                ctx.fill();

                // Монета
                ctx.fillStyle = '#ffff32';
                ctx.beginPath();
                ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ff9632';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Блик
                ctx.fillStyle = '#ff9632';
                ctx.beginPath();
                ctx.arc(this.x - 2, this.y - 2, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x + 2, this.y + 2, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            checkCollision(player) {
                if (this.collected) return false;
                const dx = this.x - (player.x + player.width / 2);
                const dy = this.y - (player.y + player.height / 2);
                return Math.hypot(dx, dy) < this.radius + 20;
            }
        }

        class Obstacle {
            constructor(x, y, width = 30, height = 30) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.active = true;
                this.color = '#ff3232';
            }

            update(speed) {
                this.x -= speed;
                if (this.x + this.width < 0) {
                    this.active = false;
                }
            }

            draw(ctx) {
                if (!this.active) return;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = '#c80000';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);

                // Шипы
                for (let i = 0; i < 3; i++) {
                    const spikeX = this.x + 5 + i * 10;
                    ctx.fillStyle = '#c83232';
                    ctx.beginPath();
                    ctx.moveTo(spikeX, this.y);
                    ctx.lineTo(spikeX + 5, this.y - 10);
                    ctx.lineTo(spikeX + 10, this.y);
                    ctx.fill();
                }
            }

            checkCollision(player) {
                if (!this.active) return false;
                return player.x < this.x + this.width &&
                    player.x + player.width > this.x &&
                    player.y < this.y + this.height &&
                    player.y + player.height > this.y;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = -Math.random() * 4 - 1;
                this.life = 30;
                this.maxLife = 30;
                this.color = color;
                this.size = 3 + Math.random() * 3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1;
                this.life -= 1;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                const alpha = this.life / this.maxLife;
                const size = this.size * alpha;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // ==================== ИГРА ====================
        class Game {
            constructor() {
                this.player = new Player();
                this.platforms = [];
                this.coins = [];
                this.obstacles = [];
                this.score = 0;
                this.coinsCollected = 0;
                this.distance = 0;
                this.speed = 6;
                this.gameOver = false;
                this.paused = false;
                this.highScore = this.loadHighScore();
                this.particles = [];
                this.coinSpawnTimer = 0;
                this.doubleJumpParticles = [];
                this.keys = {};

                // Создание начальных платформ
                const positions = [
                    [150, HEIGHT - 150 - 30],
                    [350, HEIGHT - 150 - 80],
                    [550, HEIGHT - 150 - 40],
                    [750, HEIGHT - 150 - 90],
                    [950, HEIGHT - 150 - 50],
                    [1150, HEIGHT - 150 - 70],
                ];

                for (let i = 0; i < positions.length; i++) {
                    const [x, y] = positions[i];
                    const width = 120 + Math.random() * 80;
                    this.platforms.push(new Platform(x, y, width, i));
                }

                for (let i = 0; i < 20; i++) this.spawnCoin();
                for (let i = 0; i < 2; i++) this.spawnObstacle();

                this.setupControls();
            }

            loadHighScore() {
                try {
                    const data = localStorage.getItem('subwayRunnerHighScore');
                    return data ? parseInt(data) : 0;
                } catch {
                    return 0;
                }
            }

            saveHighScore() {
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('subwayRunnerHighScore', String(this.highScore));
                }
            }

            spawnCoin() {
                if (this.platforms.length > 0) {
                    const platform = this.platforms[Math.floor(Math.random() * this.platforms.length)];
                    const x = platform.x + 20 + Math.random() * (platform.width - 40);
                    const y = platform.y - 30 - Math.random() * 40;
                    this.coins.push(new Coin(x, y));
                } else {
                    const x = WIDTH + 50 + Math.random() * 350;
                    const y = 100 + Math.random() * (HEIGHT - 300);
                    this.coins.push(new Coin(x, y));
                }
            }

            spawnObstacle() {
                const x = WIDTH + 200 + Math.random() * 400;
                const y = HEIGHT - 150 - 30;
                const width = 25 + Math.random() * 20;
                this.obstacles.push(new Obstacle(x, y, width, 30));
            }

            setupControls() {
                // Клавиатура
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    if (e.key === ' ' || e.key === 'Space') {
                        e.preventDefault();
                        if (!this.gameOver && !this.paused) {
                            this.player.jump();
                        }
                    }
                    if (e.key === 'p' || e.key === 'P') {
                        this.paused = !this.paused;
                    }
                    if (e.key === 'r' || e.key === 'R') {
                        if (this.gameOver) {
                            Object.assign(this, new Game());
                        }
                    }
                    if (e.key === 'm' || e.key === 'M') {
                        if (this.gameOver) {
                            if (showMenu()) {
                                Object.assign(this, new Game());
                            }
                        }
                    }
                });

                document.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });

                // Кнопка для мобильных устройств
                const jumpBtn = document.getElementById('jumpBtn');
                if (jumpBtn) {
                    const triggerJump = (e) => {
                        e.preventDefault();
                        if (!this.gameOver && !this.paused) {
                            this.player.jump();
                        }
                    };
                    jumpBtn.addEventListener('touchstart', triggerJump);
                    jumpBtn.addEventListener('mousedown', triggerJump);
                }
            }

            update() {
                if (this.gameOver || this.paused) return;

                this.player.update(this.platforms);
                this.score = this.player.score;
                this.distance = this.player.distance;

                this.speed = 6 + this.distance / 1500;
                this.player.speed = this.speed;

                // Обновление UI
                document.getElementById('scoreDisplay').textContent = this.score;
                document.getElementById('coinsDisplay').textContent = this.coinsCollected;
                document.getElementById('distDisplay').textContent = Math.floor(this.distance / 10);
                document.getElementById('speedDisplay').textContent = Math.floor(this.speed * 10);
                document.getElementById('highDisplay').textContent = this.highScore;

                for (const platform of this.platforms) {
                    platform.update(this.speed);
                }

                this.coinSpawnTimer += 1;
                if (this.coinSpawnTimer > 12) {
                    if (this.coins.length < 30) this.spawnCoin();
                    this.coinSpawnTimer = 0;
                }

                for (let i = this.coins.length - 1; i >= 0; i--) {
                    const coin = this.coins[i];
                    coin.update(this.speed);
                    if (coin.checkCollision(this.player)) {
                        coin.collected = true;
                        this.coinsCollected += 1;
                        this.player.coins += 1;
                        this.score += 50;
                        for (let j = 0; j < 10; j++) {
                            this.particles.push(new Particle(coin.x, coin.y, '#ffff32'));
                        }
                        this.coins.splice(i, 1);
                    }
                }

                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const obstacle = this.obstacles[i];
                    obstacle.update(this.speed);
                    if (obstacle.checkCollision(this.player)) {
                        this.gameOver = true;
                        this.player.gameOver = true;
                        this.saveHighScore();
                        for (let j = 0; j < 30; j++) {
                            this.particles.push(new Particle(
                                this.player.x + this.player.width / 2,
                                this.player.y + this.player.height / 2,
                                '#ff3232'
                            ));
                        }
                    }
                    if (!obstacle.active) {
                        this.obstacles.splice(i, 1);
                    }
                }

                if (this.obstacles.length < 3 + Math.floor(this.distance / 2000)) {
                    this.spawnObstacle();
                }

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    this.particles[i].update();
                    if (this.particles[i].life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
            }

            draw(ctx) {
                // Градиентный фон
                for (let y = 0; y < HEIGHT; y++) {
                    let r, g, b;
                    if (y < HEIGHT / 2) {
                        r = 10 + y / 20;
                        g = 20 + y / 15;
                        b = 40 + y / 10;
                    } else {
                        r = 20 + (HEIGHT - y) / 20;
                        g = 30 + (HEIGHT - y) / 15;
                        b = 50 + (HEIGHT - y) / 10;
                    }
                    ctx.fillStyle = `rgb(${Math.min(r, 60)}, ${Math.min(g, 80)}, ${Math.min(b, 100)})`;
                    ctx.fillRect(0, y, WIDTH, 1);
                }

                // Земля
                ctx.fillStyle = '#28283c';
                ctx.fillRect(0, HEIGHT - 150, WIDTH, 150);
                ctx.fillStyle = '#505064';
                ctx.fillRect(0, HEIGHT - 150, WIDTH, 5);

                // Платформы
                for (const platform of this.platforms) {
                    platform.draw(ctx);
                }

                // Монеты
                for (const coin of this.coins) {
                    coin.draw(ctx);
                }

                // Препятствия
                for (const obstacle of this.obstacles) {
                    obstacle.draw(ctx);
                }

                // Игрок
                this.player.draw(ctx);

                // Частицы
                for (const particle of this.particles) {
                    particle.draw(ctx);
                }

                // Game Over
                if (this.gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, WIDTH, HEIGHT);

                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    ctx.font = '48px Arial';
                    ctx.fillStyle = '#ff3232';
                    ctx.fillText('💀 ИГРА ОКОНЧЕНА', WIDTH / 2, HEIGHT / 2 - 100);

                    ctx.font = '28px Arial';
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(`⭐ Счет: ${this.score}`, WIDTH / 2, HEIGHT / 2 - 30);

                    ctx.fillStyle = '#ffff32';
                    ctx.fillText(`🪙 Монет: ${this.coinsCollected}`, WIDTH / 2, HEIGHT / 2 + 20);

                    ctx.fillStyle = '#ff6b6b';
                    ctx.fillText(`🏆 Рекорд: ${this.highScore}`, WIDTH / 2, HEIGHT / 2 + 70);

                    ctx.font = '24px Arial';
                    ctx.fillStyle = '#32ff32';
                    ctx.fillText('Нажми R для рестарта', WIDTH / 2, HEIGHT / 2 + 140);

                    ctx.fillStyle = '#3232ff';
                    ctx.fillText('M - меню', WIDTH / 2, HEIGHT / 2 + 190);
                }

                // Индикатор двойного прыжка в UI
                if (this.player.isJumping && !this.player.isGrounded && !this.gameOver) {
                    ctx.textAlign = 'center';
                    ctx.font = '18px Arial';
                    if (this.player.doubleJumpAvailable) {
                        ctx.fillStyle = '#ffff32';
                        ctx.fillText('🔄 Двойной прыжок!', WIDTH / 2, 70);
                    }
                }
            }
        }

        // ==================== МЕНЮ ====================
        function showMenu() {
            return new Promise((resolve) => {
                const menuContainer = document.createElement('div');
                menuContainer.style.cssText = `
                            position: absolute;
                            top: 0;
                            left: 0;
                            right: 0;
                            bottom: 0;
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            justify-content: center;
                            background: rgba(10, 10, 30, 0.95);
                            border-radius: 8px;
                            z-index: 10;
                        `;

                const title = document.createElement('h1');
                title.textContent = '🏃 SUBWAY RUNNER';
                title.style.cssText = `
                            color: #ffff32;
                            font-size: 48px;
                            margin-bottom: 10px;
                            text-shadow: 0 0 30px rgba(255, 255, 50, 0.3);
                        `;

                const subtitle = document.createElement('p');
                subtitle.textContent = 'Двойной прыжок - прыгай дважды!';
                subtitle.style.cssText = `
                            color: #ffffff;
                            font-size: 20px;
                            margin-bottom: 30px;
                        `;

                const startBtn = document.createElement('button');
                startBtn.textContent = '▶ СТАРТ';
                startBtn.style.cssText = `
                            padding: 15px 60px;
                            font-size: 28px;
                            background: #32ff32;
                            border: none;
                            border-radius: 10px;
                            color: #000;
                            cursor: pointer;
                            transition: all 0.3s;
                            font-weight: bold;
                        `;
                startBtn.addEventListener('mouseenter', () => {
                    startBtn.style.transform = 'scale(1.05)';
                    startBtn.style.boxShadow = '0 0 30px rgba(50, 255, 50, 0.3)';
                });
                startBtn.addEventListener('mouseleave', () => {
                    startBtn.style.transform = 'scale(1)';
                    startBtn.style.boxShadow = 'none';
                });

                const highScore = localStorage.getItem('subwayRunnerHighScore') || 0;
                const highText = document.createElement('p');
                highText.textContent = `🏆 Рекорд: ${highScore}`;
                highText.style.cssText = `
                            color: #ff6b6b;
                            font-size: 22px;
                            margin-top: 20px;
                        `;

                const controls = document.createElement('div');
                controls.style.cssText = `
                            color: #aaa;
                            font-size: 14px;
                            text-align: center;
                            margin-top: 20px;
                            line-height: 1.8;
                        `;
                controls.innerHTML = `
                            <b>УПРАВЛЕНИЕ:</b><br>
                            ПРОБЕЛ - прыжок (двойной прыжок!)<br>
                            P - пауза<br>
                            R - рестарт
                        `;

                menuContainer.appendChild(title);
                menuContainer.appendChild(subtitle);
                menuContainer.appendChild(startBtn);
                menuContainer.appendChild(highText);
                menuContainer.appendChild(controls);

                const container = document.getElementById('gameContainer');
                container.appendChild(menuContainer);

                // Обработчики
                const startGame = () => {
                    menuContainer.remove();
                    resolve(true);
                };

                startBtn.addEventListener('click', startGame);
                document.addEventListener('keydown', (e) => {
                    if (e.key === ' ' || e.key === 'Space' || e.key === 'Enter') {
                        e.preventDefault();
                        startGame();
                    }
                });

                // Обработка закрытия
                const checkClose = () => {
                    if (!menuContainer.parentNode) {
                        resolve(false);
                    }
                };
                const observer = new MutationObserver(checkClose);
                observer.observe(container, { childList: true });
            });
        }

        // ==================== ЗАПУСК ====================
        async function main() {
            const menuResult = await showMenu();
            if (!menuResult) return;

            const game = new Game();
            let running = true;

            function gameLoop() {
                if (!running) return;

                game.update();
                game.draw(ctx);

                requestAnimationFrame(gameLoop);
            }

            // Обработка рестарта
            const originalGameOver = game.gameOver;
            const checkRestart = setInterval(() => {
                if (game.gameOver && game.keys['r']) {
                    Object.assign(game, new Game());
                }
            }, 100);

            gameLoop();

            // Очистка при закрытии
            window.addEventListener('beforeunload', () => {
                running = false;
                clearInterval(checkRestart);
            });
        }

        // Запуск
        main();
    </script>
</body>
</html>
